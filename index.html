<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Bachelor Projekt</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1e1e2f, #3a3a5f);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 500px;
            width: 90%;
        }

        h1 {
            margin-bottom: 40px;
        }

        .btn {
            display: block;
            margin: 20px 0;
            border-radius: 15px;
            overflow: hidden;
            transition: 0.3s;
            background: linear-gradient(135deg, #111, #222);
        }

        .btn img {
            width: 100%;
            height: 140px;
            object-fit: cover;
            display: block;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Bachelor Projekt</h1>

    <a href="/n8n/" class="btn">
        <img src="/assets/n8n_logo.png" alt="n8n">
    </a>

    <a href="/openproject/" class="btn">
        <img src="/assets/openproject_logo.png" alt="OpenProject">
    </a>

</div>

</body>
</html>
