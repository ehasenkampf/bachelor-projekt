events {
    worker_connections 1024;
}

http {
    server {
        listen 80;
        server_name bachelor-projekt.de;

        # HTTP → HTTPS Redirect
        location / {
            return 301 https://$host$request_uri;
        }

        # Certbot
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
    }

    server {
        listen 443 ssl;
        server_name bachelor-projekt.de;

        ssl_certificate /etc/letsencrypt/live/bachelor-projekt.de/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/bachelor-projekt.de/privkey.pem;

        # ========================
        # Landing Page
        # ========================
        location / {
            root /usr/share/nginx/html;
            index index.html;
        }

        # ========================
        # n8n
        # ========================
        location = /n8n {
            return 301 /n8n/;
        }

        location /n8n/ {
            proxy_pass http://n8n:5678/;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Accept-Encoding "";
        }

        location /static/ {
            proxy_pass http://n8n:5678/static/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Accept-Encoding "";
        }

        # ========================
        # Landing Page Assets
        # ========================
        location = /assets/n8n_logo.png {
            root /usr/share/nginx/html;
        }

        location = /assets/openproject_logo.png {
            root /usr/share/nginx/html;
        }

        location /assets/ {
            proxy_pass http://n8n:5678/assets/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Accept-Encoding "";
        }

        location /rest/ {
            proxy_pass http://n8n:5678/rest/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Accept-Encoding "";
        }

        location /icons/ {
            proxy_pass http://n8n:5678/icons/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Accept-Encoding "";
        }

        # ========================
        # OpenProject
        # ========================
        location = /openproject {
            return 301 /openproject/;
        }

        location /openproject/ {
            proxy_pass http://openproject:8080/openproject/;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Script-Name /openproject;
        }
    }
}
